syntax = "proto3";

package s2s;

option go_package = "github.com/godyy/ggs/internal/protocol/pb/s2s";

// PID 协议ID.
// 如果协议消息结构来common, 可在其注释中添加 /from_common 标识.
//
// 分段约定：
//   - [0, 99]    基础/通用协议
//   - [100, 199] Server 信息
enum PID {
    PUnknown = 0; // 未知.
    PError = 1; // 错误. /from_common
    PActorSaveResult = 99; // Actor 保存结果.

    // Server 信息 [100, 199]
    PGetServerNameReq = 100; // 获取服务器名请求.
    PGetServerNameResp = 101; // 获取服务器名响应.
}
